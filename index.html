<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS ENTERPRISES | OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:italic,wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --bg: #0a0a0a; --accent: #c4a47c; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; padding-bottom: 110px; overflow-x: hidden; }
        .luxury-text { font-family: 'Bodoni Moda', serif; }

        #customToast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(200px); background: white; color: black; padding: 15px 30px; border-radius: 20px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        #customToast.show { transform: translateX(-50%) translateY(0); }

        .search-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px 25px; border-radius: 25px; display: flex; align-items: center; margin: 0 24px 30px 24px; backdrop-filter: blur(10px); }
        .search-input { background: transparent; border: none; outline: none; color: white; font-size: 13px; width: 100%; font-weight: 500; }

        .swiper { width: 100%; height: 260px; border-radius: 45px; margin-bottom: 30px; border: 1px solid #1a1a1a; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .cat-chip { padding: 12px 24px; border-radius: 18px; background: #111; border: 1px solid #222; font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; white-space: nowrap; }
        .cat-chip.active { background: var(--accent); color: black; border-color: var(--accent); }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 25px; border-top: 1px solid #1a1a1a; z-index: 9000; }
        #detailPage { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 50000; overflow-y: auto; padding: 25px; }
        .size-btn { width: 55px; height: 55px; border-radius: 20px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .size-btn.selected { background: var(--accent); color: black; }
        .admin-item { background: #161616; border: 1px solid #222; padding: 15px; border-radius: 25px; display: flex; align-items: center; margin-bottom: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="customToast">Action Successful!</div>

    <div id="adminAuthModal" class="hidden fixed inset-0 bg-black/95 z-[100000] flex items-center justify-center backdrop-blur-xl">
        <div class="bg-[#121212] p-10 rounded-[50px] border border-white/5 w-[90%] max-w-[360px] text-center">
            <h2 class="luxury-text text-2xl italic mb-6">Owner Verification</h2>
            <input type="password" id="adminPinInput" class="w-full bg-[#1a1a1a] border border-white/10 p-5 rounded-[25px] text-center tracking-[12px] text-xl outline-none" placeholder="••••">
            <div class="flex gap-4 mt-8">
                <button onclick="closeAdminAuth()" class="flex-1 py-5 bg-[#222] rounded-3xl text-[9px] font-bold uppercase tracking-widest">Back</button>
                <button onclick="verifyAdmin()" class="flex-1 py-5 bg-[var(--accent)] text-black rounded-3xl text-[9px] font-bold uppercase tracking-widest">Verify</button>
            </div>
        </div>
    </div>

    <div id="detailPage">
        <button onclick="closeDetail()" class="opacity-30 text-[9px] mb-8 uppercase tracking-[4px] font-black">← Return</button>
        <div id="detailMedia" class="w-full aspect-[3/4] rounded-[50px] overflow-hidden mb-10 border border-white/5"></div>
        <h2 id="dTitle" class="luxury-text text-4xl italic mb-3"></h2>
        <p id="dPrice" class="text-2xl font-bold text-[var(--accent)] mb-10"></p>
        <div class="flex gap-4 mb-14">
            <div class="size-btn" onclick="selectSize('S', this)">S</div>
            <div class="size-btn" onclick="selectSize('M', this)">M</div>
            <div class="size-btn" onclick="selectSize('L', this)">L</div>
            <div class="size-btn" onclick="selectSize('XL', this)">XL</div>
        </div>
        <button onclick="addToBagAction()" class="w-full bg-[var(--accent)] text-black py-7 rounded-[35px] font-black uppercase text-[11px] tracking-[3px]">Add to Bag 🛍️</button>
    </div>

    <div id="homePage" class="page">
        <div class="p-8 flex justify-between items-end">
            <div><h1 class="luxury-text text-4xl italic">AS ENTERPRISES</h1><p class="text-[8px] tracking-[5px] opacity-30 font-bold uppercase">Official Store</p></div>
            <div class="w-12 h-12 rounded-full border border-[var(--accent)]/30 overflow-hidden" onclick="showPage('profilePage')">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="search-container"><span class="mr-4 opacity-20 text-lg">🔍</span><input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="SEARCH COLLECTION..." class="search-input"></div>

        <div class="px-6 mb-8"><div class="swiper mainSwiper"><div class="swiper-wrapper" id="bannerWrapper"></div></div></div>

        <div class="flex gap-3 overflow-x-auto px-6 mb-10 no-scrollbar">
            <div class="cat-chip active" onclick="filterCat('All', this)">All</div>
            <div class="cat-chip" onclick="filterCat('Nighty', this)">Nighty</div>
            <div class="cat-chip" onclick="filterCat('Jeans', this)">Jeans</div>
            <div class="cat-chip" onclick="filterCat('Shirt', this)">Shirt</div>
            <div class="cat-chip" onclick="filterCat('T-Shirt', this)">T-Shirt</div>
            <div class="cat-chip" onclick="filterCat('Kurti', this)">Kurti</div>
            <div class="cat-chip" onclick="filterCat('Leggings', this)">Leggings</div>
        </div>

        <div class="grid grid-cols-2 gap-5 px-6" id="productGrid"></div>
    </div>

    <div id="cartPage" class="page hidden p-8">
        <h2 class="luxury-text text-4xl italic mb-12 text-center">Shopping Bag</h2>
        <div id="cartItems" class="space-y-5 mb-12"></div>
        <div id="cartTotalArea" class="hidden border-t border-white/5 pt-10">
            <div class="flex justify-between items-center mb-12"><span class="opacity-30 text-[9px] tracking-[4px] uppercase font-black">Subtotal</span><span id="totalPriceDisplay" class="text-3xl font-bold text-[var(--accent)]">₹0</span></div>
            <button onclick="placeOrderWhatsApp()" class="w-full bg-white text-black py-7 rounded-[35px] font-black uppercase text-[11px] tracking-[3px]">Checkout via WhatsApp</button>
        </div>
        <div id="cartEmpty" class="text-center opacity-10 mt-40 text-xs tracking-[5px] uppercase font-black">Bag is empty</div>
    </div>

    <div id="profilePage" class="page hidden p-8">
        <div class="text-center mb-12"><h2 class="luxury-text text-3xl italic text-white/50">AS ENTERPRISES</h2><p onclick="openAdminAuth()" id="unlockBtn" class="text-[9px] text-[var(--accent)] tracking-[5px] mt-8 uppercase cursor-pointer font-black bg-white/5 inline-block px-8 py-4 rounded-2xl">Admin Login</p></div>

        <div id="adminPanel" class="hidden">
            <div class="bg-[#111] p-8 rounded-[50px] border border-white/5 mb-10">
                <p class="text-[9px] opacity-30 mb-6 uppercase tracking-widest font-bold">New Product</p>
                <input type="text" id="pName" placeholder="Product Name" class="w-full bg-[#1a1a1a] p-5 rounded-2xl mb-4 outline-none text-sm">
                <input type="number" id="pPrice" placeholder="Price" class="w-full bg-[#1a1a1a] p-5 rounded-2xl mb-4 outline-none text-sm">
                <select id="pCat" class="w-full bg-[#1a1a1a] p-5 rounded-2xl mb-6 outline-none text-sm">
                    <option value="Nighty">Nighty</option>
                    <option value="Jeans">Jeans</option>
                    <option value="Shirt">Shirt</option>
                    <option value="T-Shirt">T-Shirt</option>
                    <option value="Kurti">Kurti</option>
                    <option value="Leggings">Leggings</option>
                </select>
                <label class="block w-full bg-[#1a1a1a] p-6 rounded-3xl border border-dashed border-white/10 text-center cursor-pointer mb-6">
                    <span class="text-[9px] opacity-40 font-black uppercase">Upload Media</span>
                    <input type="file" hidden onchange="handleMedia(event)">
                </label>
                <button onclick="saveProduct()" class="w-full py-6 bg-[var(--accent)] text-black rounded-[30px] font-black text-[11px] uppercase tracking-widest">Publish</button>
            </div>
            <p class="text-[9px] opacity-30 mb-6 uppercase tracking-widest font-bold px-4">Management List</p>
            <div id="adminProductList" class="space-y-3"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div onclick="showPage('homePage')" class="text-2xl cursor-pointer">🏠</div>
        <div onclick="showPage('cartPage')" class="text-2xl cursor-pointer">🛍️</div>
        <div onclick="showPage('profilePage')" class="text-2xl cursor-pointer">👤</div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let products = [{id:1, name:"Premium Nightwear", price:1499, media:"https://images.pexels.com/photos/6775268/pexels-photo-6775268.jpeg", cat:"Nighty"}];
        let cart = [], tempMedia = "", currentP = null, selectedSize = null, mySwiper;

        function showToast(msg) {
            const t = document.getElementById('customToast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'cartPage') renderCart();
            if(id === 'profilePage' && !document.getElementById('adminPanel').classList.contains('hidden')) renderAdminList();
        }

        function renderGrid(items) {
            document.getElementById('productGrid').innerHTML = items.map(p => `
                <div class="bg-[#111] rounded-[50px] overflow-hidden border border-white/5" onclick="openDetail(${p.id})">
                    <div class="w-full aspect-[4/5]"><img src="${p.media}" class="w-full h-full object-cover"></div>
                    <div class="p-7"><h3 class="text-[9px] font-black uppercase truncate tracking-[2px] opacity-70">${p.name}</h3><p class="text-[16px] text-[var(--accent)] font-black mt-2">₹${p.price}</p></div>
                </div>`).join('');
        }

        function removeProduct(id) {
            products = products.filter(p => p.id !== id);
            renderGrid(products); renderAdminList(); renderBanner();
            showToast("REMOVED SUCCESSFUL 🗑️");
        }

        function renderAdminList() {
            document.getElementById('adminProductList').innerHTML = products.map(p => `
                <div class="admin-item">
                    <img src="${p.media}" class="w-12 h-12 rounded-xl object-cover mr-4">
                    <div class="flex-1 text-[10px] font-bold uppercase truncate tracking-widest">${p.name}</div>
                    <button onclick="removeProduct(${p.id})" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Remove</button>
                </div>`).join('');
        }

        function searchProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderGrid(products.filter(p => p.name.toLowerCase().includes(query)));
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderGrid((cat === 'All') ? products : products.filter(p => p.cat === cat));
        }

        function renderBanner() {
            document.getElementById('bannerWrapper').innerHTML = products.slice(-5).map(p => `<div class="swiper-slide"><img src="${p.media}"></div>`).join('');
            if(mySwiper) mySwiper.destroy();
            mySwiper = new Swiper(".mainSwiper", { loop: true, autoplay: { delay: 3000 } });
        }

        function openDetail(id) {
            currentP = products.find(x => x.id === id);
            selectedSize = null;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('detailMedia').innerHTML = `<img src="${currentP.media}" class="w-full h-full object-cover">`;
            document.getElementById('dTitle').innerText = currentP.name;
            document.getElementById('dPrice').innerText = "₹" + currentP.price;
            document.getElementById('detailPage').style.display = 'block';
        }

        function selectSize(size, el) {
            selectedSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addToBagAction() {
            if(!selectedSize) { showToast("SELECT SIZE ⚠️"); return; }
            cart.push({...currentP, size: selectedSize});
            document.getElementById('detailPage').style.display = 'none';
            showToast("ADDED TO BAG! 🛍️");
        }

        function renderCart() {
            const cList = document.getElementById('cartItems'), totalArea = document.getElementById('cartTotalArea'), emptyMsg = document.getElementById('cartEmpty');
            if(cart.length === 0) { emptyMsg.classList.remove('hidden'); totalArea.classList.add('hidden'); cList.innerHTML = ""; }
            else {
                emptyMsg.classList.add('hidden'); totalArea.classList.remove('hidden');
                let total = 0;
                cList.innerHTML = cart.map((item, idx) => { 
                    total += parseInt(item.price); 
                    return `<div class="flex items-center bg-[#111] p-6 rounded-[40px] border border-white/5">
                        <img src="${item.media}" class="w-20 h-20 rounded-2xl object-cover mr-6">
                        <div class="flex-1"><b class="text-[10px] uppercase tracking-widest font-black">${item.name}</b><p class="opacity-30 text-[9px] mt-2 font-bold uppercase">Size: ${item.size} • ₹${item.price}</p></div>
                        <button onclick="cart.splice(${idx},1);renderCart()" class="text-red-500/50 font-bold ml-4">✕</button>
                    </div>`;
                }).join('');
                document.getElementById('totalPriceDisplay').innerText = "₹" + total;
            }
        }

        function placeOrderWhatsApp() {
            let orderList = cart.map(item => `- ${item.name} [Size: ${item.size}] (₹${item.price})`).join('%0A');
            window.open(`https://wa.me/919211698297?text=*NEW ORDER - AS ENTERPRISES*%0A%0A${orderList}%0A%0A*Total:* ${document.getElementById('totalPriceDisplay').innerText}`, '_blank');
        }

        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }
        function openAdminAuth() { document.getElementById('adminAuthModal').classList.remove('hidden'); }
        function closeAdminAuth() { document.getElementById('adminAuthModal').classList.add('hidden'); }
        function verifyAdmin() { 
            if(document.getElementById('adminPinInput').value === "9211") { 
                closeAdminAuth(); 
                document.getElementById('adminPanel').classList.remove('hidden'); 
                document.getElementById('unlockBtn').classList.add('hidden');
                renderAdminList();
            } 
        }

        function handleMedia(e) {
            const r = new FileReader();
            r.onload = (ev) => tempMedia = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        }

        function saveProduct() {
            const name = document.getElementById('pName').value, price = document.getElementById('pPrice').value, cat = document.getElementById('pCat').value;
            if(name && price && tempMedia) {
                products.push({id: Date.now(), name, price, media: tempMedia, cat});
                renderGrid(products); renderAdminList(); renderBanner();
                showToast("PUBLISHED! ✅");
            }
        }

        window.onload = () => { renderGrid(products); renderBanner(); };
    </script>
</body>
</html>
